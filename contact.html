<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | GreenScape</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:#f6f8f5;}

/* NAV */
nav{
position:fixed;top:0;width:100%;height:70px;background:white;
display:flex;justify-content:space-between;align-items:center;
padding:0 20px;z-index:9999;
}
.logo{
font-size:1.5rem;font-weight:800;
background:linear-gradient(135deg,#2e7d32,#56ab2f);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.menu-toggle{font-size:1.8rem;cursor:pointer;}

.nav-links{
position:fixed;top:70px;width:100%;background:white;
display:none;flex-direction:column;align-items:center;
gap:20px;padding:30px 0;
}
.nav-links.active{display:flex;}
.nav-links a{color:#222;text-decoration:none;font-weight:600;}
.nav-btn{
background:linear-gradient(135deg,#56ab2f,#2e7d32);
color:white;padding:12px 24px;border-radius:999px;
}

/* HERO */
.hero{
height:40vh;
background:url('https://images.unsplash.com/photo-1560185127-6ed189bf02f4') center/cover no-repeat;
display:flex;align-items:center;justify-content:center;
color:white;text-align:center;
position:relative;
}
.hero::after{
content:"";position:absolute;inset:0;
background:rgba(0,0,0,0.45);
}
.hero h1{position:relative;z-index:2;font-size:2.2rem;}

/* FORM SECTION */
.section{
padding:70px 20px;
display:flex;
justify-content:center;
}

.form-box{
background:white;
padding:40px;
border-radius:14px;
box-shadow:0 15px 40px rgba(0,0,0,0.1);
max-width:500px;
width:100%;
}

.form-box h2{
margin-bottom:10px;
}

.form-box p{
margin-bottom:20px;
color:#555;
}

input,textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:14px;
border:none;
background:linear-gradient(135deg,#56ab2f,#2e7d32);
color:white;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

</style>
</head>

<body>

<nav>
<div class="logo">GreenScape</div>
<div class="menu-toggle" onclick="toggleMenu()">☰</div>
</nav>

<div class="nav-links" id="menu">
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="work.html">Work</a>
<a href="contact.html" class="nav-btn">Get Quote</a>
</div>

<div class="hero">
<h1>Request a Free Quote</h1>
</div>

<div class="section">
<div class="form-box">

<h2>Let’s Talk About Your Yard</h2>
<p>Fill this out and we’ll reach out within 24 hours.</p>

<input placeholder="Full Name">
<input placeholder="Email Address">
<input placeholder="Phone Number">
<textarea placeholder="Describe your project..."></textarea>

<button>Request Quote</button>

</div>
</div>

<script>
function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
