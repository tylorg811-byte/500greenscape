<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | GreenScape</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:#f6f8f5;}

nav{position:fixed;top:0;width:100%;height:70px;background:white;display:flex;justify-content:space-between;align-items:center;padding:0 20px;}
.logo{font-weight:800;font-size:1.5rem;color:#2e7d32;}

.form{
  padding:120px 20px;
  max-width:500px;
  margin:auto;
}

input,textarea{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:14px;
  border:none;
  background:#2e7d32;
  color:white;
  border-radius:10px;
  font-weight:600;
}
</style>
</head>

<body>

<nav>
  <div class="logo">GreenScape</div>
</nav>

<div class="form">
  <h2>Get a Free Quote</h2>

  <input placeholder="Your Name">
  <input placeholder="Email">
  <textarea placeholder="Tell us about your project"></textarea>

  <button>Request Quote</button>
</div>

</body>
</html>
