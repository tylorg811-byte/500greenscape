<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | GreenScape</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;}

nav{
  position:fixed;top:0;width:100%;height:70px;background:white;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 20px;z-index:9999;
}

.logo{
  font-size:1.5rem;font-weight:800;
  background:linear-gradient(135deg,#2e7d32,#56ab2f);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

.menu-toggle{font-size:1.8rem;cursor:pointer;}

.nav-links{
  position:fixed;top:70px;width:100%;background:white;
  display:none;flex-direction:column;align-items:center;
  gap:20px;padding:30px 0;
}

.nav-links.active{display:flex;}

.nav-btn{
  background:linear-gradient(135deg,#56ab2f,#2e7d32);
  color:white;padding:12px 26px;border-radius:999px;
}

.form{
  padding:120px 20px;
  max-width:500px;
  margin:auto;
}

input,textarea{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:14px;
  border:none;
  background:linear-gradient(135deg,#56ab2f,#2e7d32);
  color:white;
  border-radius:10px;
  font-weight:600;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(40px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<nav>
  <div class="logo">GreenScape</div>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</nav>

<div class="nav-links" id="menu">
  <a href="index.html">Home</a>
  <a href="services.html">Services</a>
  <a href="work.html">Work</a>
  <a href="contact.html" class="nav-btn">Get Quote</a>
</div>

<div class="form">
  <h2>Get a Free Quote</h2>

  <input placeholder="Your Name">
  <input placeholder="Email">
  <textarea placeholder="Tell us about your project"></textarea>

  <button>Request Quote</button>
</div>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
