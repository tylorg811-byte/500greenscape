<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenScape Landscaping</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:#f6f8f5;}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
height:70px;
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
z-index:9999;
}

.logo{
font-weight:800;
font-size:1.5rem;
background:linear-gradient(135deg,#2e7d32,#56ab2f);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.menu-toggle{
font-size:1.8rem;
cursor:pointer;
}

/* DROPDOWN MENU */
.nav-links{
position:fixed;
top:70px;
left:0;
width:100%;
background:white;
display:none;
flex-direction:column;
align-items:center;
gap:20px;
padding:25px 0;
z-index:9998;
}

.nav-links.active{
display:flex;
}

.nav-links a{
text-decoration:none;
color:#222;
font-weight:600;
font-size:1.2rem;
}

.nav-btn{
background:linear-gradient(135deg,#56ab2f,#2e7d32);
color:white;
padding:12px 26px;
border-radius:999px;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
position:relative;
overflow:hidden;
}

/* BACKGROUND IMAGE (FIXED + ZOOM) */
.hero::before{
content:"";
position:absolute;
inset:0;
background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover no-repeat;
z-index:0;

/* STRONGER ZOOM */
animation:zoom 18s ease-in-out infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

/* OVERLAY */
.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.45);
z-index:1;
}

/* CONTENT */
.hero-content{
position:relative;
z-index:2;
max-width:700px;
padding:20px;
}

.hero h1{
font-size:2.6rem;
margin-bottom:15px;
}

.hero p{
font-size:1.1rem;
margin-bottom:25px;
}

.hero a{
background:linear-gradient(135deg,#56ab2f,#2e7d32);
padding:14px 28px;
border-radius:999px;
color:white;
text-decoration:none;
font-weight:600;
display:inline-block;
}

</style>
</head>

<body>

<nav>
<div class="logo">GreenScape</div>
<div class="menu-toggle" id="menuBtn">☰</div>
</nav>

<div class="nav-links" id="menu">
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="work.html">Work</a>
<a href="contact.html" class="nav-btn">Get Quote</a>
</div>

<!-- HERO -->
<div class="hero">
<div class="hero-content">
<h1>A Better Looking Yard</h1>
<p>Professional landscaping that keeps your home clean and maintained.</p>
<a href="contact.html">Get a Free Quote</a>
</div>
</div>

<script>
/* FIXED MENU (THIS WAS THE PROBLEM) */
document.getElementById("menuBtn").addEventListener("click", function(){
document.getElementById("menu").classList.toggle("active");
});
</script>

</body>
</html>
