<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenScape Landscaping</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  overflow-x:hidden;
  background:#f6f8f5;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  position:fixed;
  width:100%;
  top:0;
  z-index:1000;
}

.logo{
  font-weight:700;
  font-size:1.2rem;
}

.nav-links{
  display:flex;
  align-items:center;
  gap:12px;
}

.nav-links a{
  text-decoration:none;
  color:#1f2a1f;
  font-size:0.9rem;
}

/* BUTTON */
.nav-btn{
  background:linear-gradient(135deg,#4CAF50,#2e7d32);
  color:white;
  padding:7px 11px;
  border-radius:6px;
  font-size:0.8rem;
  font-weight:600;
  white-space:nowrap;
}

/* HERO (THIS FIXES YOUR ISSUE) */
.hero{
  height:100vh; /* 🔥 fills full screen */
  width:100%;
  background:
    linear-gradient(rgba(0,0,0,0.15), rgba(0,0,0,0.25)),
    url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover no-repeat;

  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;

  padding:80px 20px 40px; /* space for fixed nav */
}

/* CONTENT */
.hero-content{
  max-width:700px;
}

/* TEXT */
.hero h1{
  font-size:2.4rem;
  color:white;
  text-shadow:0 6px 25px rgba(0,0,0,0.8);
}

.hero p{
  margin:15px 0;
  font-size:1.1rem;
  color:white;
  text-shadow:0 4px 15px rgba(0,0,0,0.7);
}

/* BUTTON */
.btn{
  background:linear-gradient(135deg,#4CAF50,#2e7d32);
  color:white;
  padding:14px 24px;
  border-radius:8px;
  text-decoration:none;
  display:inline-block;
  font-weight:600;
  box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

/* SECTION */
section{
  padding:60px 20px;
  max-width:1000px;
  margin:auto;
}

h2{
  text-align:center;
  margin-bottom:25px;
}

/* GRID */
.services{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
  text-align:center;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">GreenScape</div>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">Services</a>
    <a href="#">Work</a>
    <a href="#" class="nav-btn">Get Quote</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>A Better Looking Yard</h1>
    <p>Professional landscaping that keeps your home clean and maintained.</p>
    <a href="#" class="btn">Get a Free Quote</a>
  </div>
</div>

<!-- SERVICES -->
<section>
  <h2>Our Services</h2>
  <div class="services">
    <div class="card">Lawn Care</div>
    <div class="card">Landscape Design</div>
    <div class="card">Cleanup</div>
  </div>
</section>

</body>
</html>
