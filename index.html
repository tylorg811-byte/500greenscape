<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenScape Landscaping</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:#f6f8f5;}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  height:70px;
  background:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  z-index:9999; /* 🔥 VERY HIGH */
}

.logo{
  font-size:1.5rem;
  font-weight:800;
  color:#2e7d32;
}

.menu-toggle{
  font-size:1.8rem;
  cursor:pointer;
}

/* MENU */
.nav-links{
  position:fixed;
  top:70px;
  left:0;
  width:100%;
  background:white;
  display:none;
  flex-direction:column;
  align-items:center;
  gap:20px;
  padding:25px 0;
  z-index:9999; /* 🔥 ABOVE EVERYTHING */
}

.nav-links.active{
  display:flex;
}

.nav-links a{
  text-decoration:none;
  color:#222;
  font-weight:600;
  font-size:1.1rem;
  z-index:10000;
  position:relative;
}

/* BUTTON */
.nav-btn{
  background:#2e7d32;
  color:white;
  padding:12px 24px;
  border-radius:999px;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:90px 20px 40px;
  position:relative;
  overflow:hidden;
}

/* IMAGE */
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover no-repeat;
  z-index:0;
  animation:zoom 20s ease-in-out infinite alternate;
}

/* 🔥 OVERLAY FIX */
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:1;
  pointer-events:none; /* 🔥 CRITICAL FIX */
}

/* HERO CONTENT */
.hero div{
  position:relative;
  z-index:2; /* ABOVE overlay */
}

.hero h1{color:white;font-size:2.5rem;}
.hero p{color:white;margin:15px 0;}

.btn{
  background:#2e7d32;
  color:white;
  padding:14px 30px;
  border-radius:999px;
  text-decoration:none;
}

/* ZOOM */
@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.1);}
}

</style>
</head>

<body>

<nav>
  <div class="logo">GreenScape</div>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</nav>

<div class="nav-links" id="menu">
  <a href="index.html">Home</a>
  <a href="services.html">Services</a>
  <a href="work.html">Work</a>
  <a href="contact.html" class="nav-btn">Get Quote</a>
</div>

<div class="hero">
  <div>
    <h1>A Better Looking Yard</h1>
    <p>Professional landscaping that keeps your home stand out.</p>
    <a href="contact.html" class="btn">Get a Free Quote</a>
  </div>
</div>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}

/* CLOSE MENU ON CLICK */
document.querySelectorAll("#menu a").forEach(link=>{
  link.addEventListener("click", ()=>{
    document.getElementById("menu").classList.remove("active");
  });
});
</script>

</body>
</html>
