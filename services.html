<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services | GreenScape</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:#f6f8f5;}

/* NAV */
nav{
  position:fixed;top:0;width:100%;height:70px;background:white;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 20px;z-index:9999;
}

.logo{
  font-size:1.5rem;font-weight:800;
  background:linear-gradient(135deg,#2e7d32,#56ab2f);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.menu-toggle{font-size:1.8rem;cursor:pointer;}

.nav-links{
  position:fixed;top:70px;width:100%;background:white;
  display:none;flex-direction:column;align-items:center;
  gap:20px;padding:25px 0;z-index:9999;
}

.nav-links.active{display:flex;}

.nav-links a{
  text-decoration:none;color:#222;font-weight:600;font-size:1.1rem;
}

.nav-btn{
  background:linear-gradient(135deg,#56ab2f,#2e7d32);
  color:white;padding:12px 24px;border-radius:999px;
}

/* PAGE */
.page{padding:110px 20px 60px;max-width:1100px;margin:auto;}

.service{
  background:white;padding:30px;border-radius:12px;
  margin-bottom:20px;box-shadow:0 10px 30px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<nav>
  <div class="logo">GreenScape</div>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</nav>

<div class="nav-links" id="menu">
  <a href="index.html">Home</a>
  <a href="services.html">Services</a>
  <a href="work.html">Work</a>
  <a href="contact.html" class="nav-btn">Get Quote</a>
</div>

<div class="page">
  <h1>Our Services</h1>

  <div class="service">
    <h3>Lawn Maintenance</h3>
    <p>Weekly mowing, trimming, edging, and upkeep.</p>
  </div>

  <div class="service">
    <h3>Landscape Design</h3>
    <p>Custom yard transformations that increase curb appeal.</p>
  </div>

  <div class="service">
    <h3>Yard Cleanup</h3>
    <p>Seasonal cleanups and full property refresh services.</p>
  </div>
</div>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}

document.querySelectorAll("#menu a").forEach(link=>{
  link.addEventListener("click", ()=>{
    document.getElementById("menu").classList.remove("active");
  });
});
</script>

</body>
</html>
