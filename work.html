<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Work | GreenScape Landscaping</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:#f6f8f5;}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
height:70px;
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
z-index:10000;
}

.logo{
font-weight:800;
font-size:1.5rem;
background:linear-gradient(135deg,#2e7d32,#56ab2f);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.menu-toggle{
font-size:1.8rem;
cursor:pointer;
}

/* DROPDOWN */
.nav-links{
position:fixed;
top:70px;
left:0;
width:100%;
background:white;
display:none;
flex-direction:column;
align-items:center;
gap:20px;
padding:25px 0;
z-index:9999;
}

.nav-links.active{
display:flex;
}

.nav-links a{
text-decoration:none;
color:#222;
font-weight:600;
font-size:1.2rem;
}

.nav-btn{
background:linear-gradient(135deg,#56ab2f,#2e7d32);
color:white;
padding:12px 26px;
border-radius:999px;
}

/* HERO */
.hero{
height:45vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
position:relative;
margin-top:70px;
overflow:hidden;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:url('https://images.unsplash.com/photo-1598902108854-10e335adac99') center/cover no-repeat;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.5);
}

.hero h1{
position:relative;
z-index:2;
font-size:2.2rem;
}

/* PORTFOLIO */
.section{
padding:70px 20px;
max-width:1100px;
margin:auto;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
margin-top:40px;
}

.project{
position:relative;
border-radius:12px;
overflow:hidden;
height:220px; /* FIXED SIZE */
cursor:pointer;
opacity:0;
transform:translateY(30px);
transition:0.6s;
}

.project.show{
opacity:1;
transform:translateY(0);
}

.project img{
width:100%;
height:100%;
object-fit:cover; /* FIXES HUGE IMAGES */
transition:0.4s;
}

/* HOVER EFFECT */
.project:hover img{
transform:scale(1.1);
}

.project::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.35);
opacity:0;
transition:0.3s;
}

.project:hover::after{
opacity:1;
}

.project span{
position:absolute;
bottom:15px;
left:15px;
color:white;
font-weight:600;
z-index:2;
opacity:0;
transition:0.3s;
}

.project:hover span{
opacity:1;
}

/* CTA */
.cta{
margin-top:60px;
background:linear-gradient(135deg,#56ab2f,#2e7d32);
padding:40px 20px;
border-radius:12px;
color:white;
}

.cta a{
margin-top:15px;
display:inline-block;
background:white;
color:#2e7d32;
padding:12px 24px;
border-radius:999px;
text-decoration:none;
font-weight:600;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
<div class="logo">GreenScape</div>
<div class="menu-toggle" id="menuBtn">☰</div>
</nav>

<div class="nav-links" id="menu">
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="work.html">Work</a>
<a href="contact.html" class="nav-btn">Get Quote</a>
</div>

<!-- HERO -->
<div class="hero">
<h1>Our Work</h1>
</div>

<!-- PORTFOLIO -->
<div class="section">

<h2>Recent Projects</h2>

<div class="grid">

<div class="project">
<img src="https://images.unsplash.com/photo-1591825729269-caeb344f6df2">
<span>Modern Backyard Design</span>
</div>

<div class="project">
<img src="https://images.unsplash.com/photo-1560185127-6ed189bf02f4">
<span>Full Yard Cleanup</span>
</div>

<div class="project">
<img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6">
<span>Landscape Installation</span>
</div>

<div class="project">
<img src="https://images.unsplash.com/photo-1585320806297-9794b3e4eeae">
<span>Irrigation Setup</span>
</div>

<div class="project">
<img src="https://images.unsplash.com/photo-1615873968403-89e068629265">
<span>Outdoor Living Space</span>
</div>

<div class="project">
<img src="https://images.unsplash.com/photo-1625246333195-78d9c38ad449">
<span>Lawn Transformation</span>
</div>

</div>

<!-- CTA -->
<div class="cta">
<h2>Like What You See?</h2>
<p>Let’s bring your yard to life with the same level of quality.</p>
<a href="contact.html">Get a Free Quote</a>
</div>

</div>

<script>
/* MENU */
document.getElementById("menuBtn").addEventListener("click", function(){
document.getElementById("menu").classList.toggle("active");
});

/* ANIMATION */
const projects=document.querySelectorAll(".project");

window.addEventListener("scroll", ()=>{
projects.forEach(p=>{
const top=p.getBoundingClientRect().top;
if(top < window.innerHeight - 50){
p.classList.add("show");
}
});
});
</script>

</body>
</html>
